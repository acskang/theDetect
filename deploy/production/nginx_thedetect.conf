server {
    listen 80;
    server_name detect.thesysm.com;
    include proxy_params;
    include /etc/nginx/snippets/common_django_app.conf;

    location / {
        proxy_pass http://unix:/run/gunicorn_thedetect.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /static/ {
        alias /var/www/thedetect/static/;
        expires 30d;
    }

    location /media/ {
        alias /var/www/thedetect/media/;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
