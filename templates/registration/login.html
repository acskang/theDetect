{% extends "base.html" %}

{% block title %}Login - theDetect{% endblock %}
{% block page_title %}Login{% endblock %}

{% block content %}
  <section class="mx-auto max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    {% if form.errors %}
      <div class="mb-4 rounded-md bg-red-50 px-3 py-2 text-sm text-red-700">
        Login failed. Check your username or phone number and password.
      </div>
    {% endif %}
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div>
        <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-slate-700">Username or phone number</label>
        <input
          id="{{ form.username.id_for_label }}"
          name="{{ form.username.html_name }}"
          value="{{ form.username.value|default_if_none:'' }}"
          autocomplete="username"
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          required
        >
      </div>
      <div>
        <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-slate-700">Password</label>
        <input
          id="{{ form.password.id_for_label }}"
          name="{{ form.password.html_name }}"
          type="password"
          autocomplete="current-password"
          class="mt-1 w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          required
        >
      </div>
      <button type="submit" class="w-full rounded-md bg-blue-700 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-800">
        Sign in
      </button>
      <p class="text-center text-sm text-slate-600">
        No account?
        <a href="{% url 'accounts:signup' %}{% if next %}?next={{ next|urlencode }}{% endif %}" class="font-medium text-blue-700">Create one</a>
      </p>
    </form>
  </section>
{% endblock %}
